name: Multi-OS Testing - Krishna

on:
  push:
    branches:
      - master

jobs:
  test-ubuntu:
    runs-on: ubuntu-latest

    steps:
      - name: Start Ubuntu test
        run: echo "Testing on Ubuntu"

      - name: Show Ubuntu system details
        run: uname -a

      - name: Write Ubuntu test file
        run: echo "Ubuntu test by Krishna" > test-ubuntu.txt

      - name: Read Ubuntu test file
        run: cat test-ubuntu.txt

      - name: Finish Ubuntu test
        run: echo "Ubuntu tests completed"

  test-windows:
    runs-on: windows-latest

    steps:
      - name: Start Windows test
        run: echo "Testing on Windows"

      - name: Show Windows system details
        run: systeminfo

      - name: Write Windows test file
        run: echo "Windows test by Krishna" > test-windows.txt

      - name: Read Windows test file
        run: type test-windows.txt

      - name: Finish Windows test
        run: echo "Windows tests completed"
        
